name: 'Validate MultiFlexi App Definitions'
description: >-
  Validates *.multiflexi.app.json files against the MultiFlexi application
  schema using multiflexi-cli (installed from repo.multiflexi.eu).
author: 'VitexSoftware'

branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  path-glob:
    description: 'Glob (relative to repo root) matching app definition files to validate'
    required: false
    default: 'multiflexi/*.json'
  apt-repo-suite:
    description: >-
      Debian/Ubuntu suite name for the repo.multiflexi.eu apt line. Defaults
      to autodetecting the runner's codename via lsb_release.
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Validate JSON syntax
      shell: bash
      env:
        PATH_GLOB: ${{ inputs.path-glob }}
      run: |
        set -euo pipefail
        shopt -s nullglob
        for file in $PATH_GLOB; do
          echo "Validating syntax: $file"
          python3 -m json.tool "$file" > /dev/null
        done

    - name: Install multiflexi-cli
      shell: bash
      env:
        APT_REPO_SUITE: ${{ inputs.apt-repo-suite }}
        DEBIAN_FRONTEND: noninteractive
      run: |
        set -euo pipefail
        suite="$APT_REPO_SUITE"
        if [ -z "$suite" ]; then
          suite="$(lsb_release -sc)"
        fi
        sudo curl -fsSL https://repo.multiflexi.eu/KEY.gpg -o /usr/share/keyrings/multiflexi-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/multiflexi-archive-keyring.gpg] https://repo.multiflexi.eu/ ${suite} main" | sudo tee /etc/apt/sources.list.d/multiflexi.list
        sudo apt-get update
        # multiflexi-cli's User bootstrap needs a working DB even for stateless commands
        # like validate-json; multiflexi-sqlite provisions one non-interactively via
        # dbconfig-common, with no external DB server needed.
        sudo apt-get install -y multiflexi-cli multiflexi-sqlite

        # dbconfig-common writes DB_* settings to /etc/multiflexi/database.env, but
        # multiflexi-cli only auto-loads /etc/multiflexi/multiflexi.env — merge them
        # so the DB connection it bootstraps is actually the one dbconfig-common created.
        if [ -f /etc/multiflexi/database.env ]; then
          sudo tee -a /etc/multiflexi/multiflexi.env < /etc/multiflexi/database.env > /dev/null
        fi

    - name: Validate against MultiFlexi schema
      shell: bash
      env:
        PATH_GLOB: ${{ inputs.path-glob }}
      run: |
        set -euo pipefail
        shopt -s nullglob
        status=0
        for file in $PATH_GLOB; do
          echo "Validating schema: $file"
          if ! multiflexi-cli application:validate-json --file "$file"; then
            status=1
          fi
        done
        exit "$status"
